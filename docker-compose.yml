services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - ollama
    environment:
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      WHISPER_MODEL_PATH: /app/models/faster-whisper-base
      KMP_DUPLICATE_LIB_OK: "TRUE"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped

volumes:
  redis_data:
  ollama_data:
